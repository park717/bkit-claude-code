# kube-prometheus-stack Helm Values — Auto-generated by bkit
# helm install monitoring prometheus-community/kube-prometheus-stack -f values.yaml

prometheus:
  prometheusSpec:
    retention: 15d
    resources:
      requests: { cpu: "500m", memory: "1Gi" }
      limits: { cpu: "1", memory: "2Gi" }
    serviceMonitorSelector: {}
    podMonitorSelector: {}

grafana:
  enabled: true
  adminPassword: "${GRAFANA_ADMIN_PASSWORD}"
  dashboardProviders:
    dashboardproviders.yaml:
      apiVersion: 1
      providers:
        - name: default
          folder: ''
          type: file
          options:
            path: /var/lib/grafana/dashboards/default
  datasources:
    datasources.yaml:
      apiVersion: 1
      datasources:
        - name: Prometheus
          type: prometheus
          url: http://monitoring-kube-prometheus-prometheus:9090
          isDefault: true
        - name: Loki
          type: loki
          url: http://loki:3100
        - name: Tempo
          type: tempo
          url: http://tempo:3100

alertmanager:
  config:
    route:
      receiver: 'slack-notifications'
      group_by: ['alertname', 'namespace']
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h
      routes:
        - match:
            severity: critical
          receiver: 'pagerduty-critical'
        - match:
            severity: warning
          receiver: 'slack-notifications'
    receivers:
      - name: 'slack-notifications'
        slack_configs:
          - api_url: "${SLACK_WEBHOOK_URL}"
            channel: '#error-alerts'
            title: '[{{ .Status }}] {{ .CommonLabels.alertname }}'
            text: '{{ .CommonAnnotations.description }}'
      - name: 'pagerduty-critical'
        pagerduty_configs:
          - service_key: "${PAGERDUTY_SERVICE_KEY}"
            severity: critical
