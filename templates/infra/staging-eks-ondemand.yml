# Staging EKS On-Demand — Auto-generated by bkit
# Creates EKS cluster for PR/release testing, destroys after verification
# Cost optimization: ~$10-30/month vs $150+/month always-on

name: Staging EKS On-Demand

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize]
  workflow_dispatch:
    inputs:
      action:
        description: 'create or destroy'
        required: true
        default: 'create'
        type: choice
        options: [create, destroy]

env:
  CLUSTER_NAME: staging-${{ github.event.pull_request.number || 'manual' }}
  AWS_REGION: ap-northeast-2

jobs:
  create-staging:
    if: github.event_name == 'pull_request' || github.event.inputs.action == 'create'
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Create EKS cluster (eksctl)
        run: |
          eksctl create cluster \
            --name ${{ env.CLUSTER_NAME }} \
            --region ${{ env.AWS_REGION }} \
            --version 1.29 \
            --nodegroup-name staging-nodes \
            --node-type t3.medium \
            --nodes 2 \
            --nodes-min 1 \
            --nodes-max 3 \
            --managed \
            --spot \
            --tags "Environment=staging,ManagedBy=bkit,PR=${{ github.event.pull_request.number }}"

      - name: Deploy application
        run: |
          kubectl apply -f infra/k8s/overlays/staging/
          echo "Staging deployed: ${{ env.CLUSTER_NAME }}"

      - name: Run verification
        run: |
          echo "Waiting for pods to be ready..."
          kubectl wait --for=condition=ready pod -l app --timeout=300s
          echo "Staging verification complete"

  destroy-staging:
    if: github.event.action == 'closed' || github.event.inputs.action == 'destroy'
    runs-on: ubuntu-latest
    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Destroy EKS cluster
        run: |
          eksctl delete cluster --name ${{ env.CLUSTER_NAME }} --region ${{ env.AWS_REGION }} --wait
          echo "Staging cluster destroyed: ${{ env.CLUSTER_NAME }}"
